<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>本地语音转文字工具</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 40px 30px;
            text-align: center;
        }
        .header h1 { font-size: 32px; margin-bottom: 10px; }
        .header p { opacity: 0.9; font-size: 16px; }
        .content { padding: 40px 30px; }
        
        .alert {
            padding: 15px 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 15px;
            display: none;
        }
        .alert.show { display: block; }
        .alert.info { background: #dbeafe; color: #1e40af; border-left: 4px solid #3b82f6; }
        .alert.success { background: #d1fae5; color: #065f46; border-left: 4px solid #10b981; }
        .alert.error { background: #fee2e2; color: #991b1b; border-left: 4px solid #ef4444; }
        .alert.warning { background: #fef3c7; color: #92400e; border-left: 4px solid #f59e0b; }
        
        .upload-box {
            border: 3px dashed #cbd5e1;
            border-radius: 15px;
            padding: 60px 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            background: #f8fafc;
            margin-bottom: 30px;
        }
        .upload-box:hover {
            border-color: #667eea;
            background: #eff6ff;
            transform: translateY(-2px);
        }
        .upload-box.dragover {
            border-color: #667eea;
            background: #dbeafe;
            transform: scale(1.02);
        }
        .upload-icon { font-size: 64px; margin-bottom: 15px; }
        .upload-text { font-size: 18px; color: #374151; font-weight: 600; }
        .upload-hint { font-size: 14px; color: #6b7280; margin-top: 8px; }
        input[type="file"] { display: none; }
        
        .control-panel {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 15px;
            margin-bottom: 25px;
        }
        @media (max-width: 600px) { .control-panel { grid-template-columns: 1fr; } }
        
        .form-group label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: #374151;
            margin-bottom: 8px;
        }
        select, button {
            width: 100%;
            padding: 12px 16px;
            border-radius: 8px;
            border: 2px solid #e5e7eb;
            font-size: 16px;
            outline: none;
            transition: all 0.2s;
        }
        select:focus { border-color: #667eea; }
        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            cursor: pointer;
            font-weight: 600;
            height: 100%;
            min-height: 48px;
        }
        button:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }
        button:disabled {
            background: #9ca3af;
            cursor: not-allowed;
            opacity: 0.7;
        }
        
        .progress-box {
            background: #f3f4f6;
            padding: 20px;
            border-radius: 10px;
            margin: 20px 0;
            display: none;
        }
        .progress-box.show { display: block; }
        .progress-bar-bg {
            height: 12px;
            background: #e5e7eb;
            border-radius: 6px;
            overflow: hidden;
        }
        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            width: 0%;
            transition: width 0.3s ease;
            border-radius: 6px;
        }
        .progress-text {
            display: flex;
            justify-content: space-between;
            margin-top: 10px;
            font-size: 14px;
            color: #6b7280;
        }
        
        .result-box {
            background: #f9fafb;
            border: 2px solid #e5e7eb;
            border-radius: 12px;
            padding: 25px;
            margin-top: 25px;
            display: none;
        }
        .result-box.show { display: block; }
        .result-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 15px;
            border-bottom: 2px solid #e5e7eb;
        }
        .result-content {
            white-space: pre-wrap;
            line-height: 1.8;
            color: #1f2937;
            font-size: 16px;
            max-height: 500px;
            overflow-y: auto;
        }
        .copy-btn {
            background: #10b981;
            padding: 8px 16px;
            font-size: 14px;
            width: auto;
        }
        .copy-btn:hover { background: #059669; }
        
        .stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin: 20px 0;
        }
        .stat-card {
            background: #f3f4f6;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
        }
        .stat-value {
            font-size: 24px;
            font-weight: 700;
            color: #667eea;
        }
        .stat-label {
            font-size: 13px;
            color: #6b7280;
            margin-top: 5px;
        }
        
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #ffffff;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        .tips {
            background: #fef3c7;
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
            font-size: 14px;
            color: #92400e;
        }
        .tips strong { color: #78350f; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎙️ 本地语音转文字</h1>
            <p>基于 OpenAI Whisper | 浏览器本地处理 | 视频不上传</p>
        </div>
        
        <div class="content">
            <div class="alert info show" id="statusAlert">
                欢迎使用！首次使用需要下载 AI 模型（约 150MB），请耐心等待。
            </div>
            
            <div class="upload-box" id="dropZone">
                <div class="upload-icon">📁</div>
                <div class="upload-text">点击选择或拖拽文件到此处</div>
                <div class="upload-hint">支持 MP4、MP3、WAV、M4A、WEBM、MOV 格式</div>
                <input type="file" id="fileInput" accept="video/*,audio/*">
            </div>
            
            <div class="stats" id="statsPanel" style="display: none;">
                <div class="stat-card">
                    <div class="stat-value" id="fileSize">-</div>
                    <div class="stat-label">文件大小</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="audioDuration">-</div>
                    <div class="stat-label">音频时长</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="estimateTime">-</div>
                    <div class="stat-label">预估耗时</div>
                </div>
            </div>
            
            <div class="control-panel">
                <div class="form-group">
                    <label>选择模型（精度越高越慢）</label>
                    <select id="modelSelect">
                        <option value="tiny">Tiny - 极速模式（39MB，适合测试）</option>
                        <option value="base" selected>Base - 平衡模式（74MB，推荐）</option>
                        <option value="small">Small - 高精度（466MB，较慢）</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>&nbsp;</label>
                    <button onclick="loadModel()" id="loadModelBtn">
                        ⚡ 加载模型
                    </button>
                </div>
            </div>
            
            <div class="progress-box" id="progressBox">
                <div class="progress-bar-bg">
                    <div class="progress-bar" id="progressBar"></div>
                </div>
                <div class="progress-text">
                    <span id="progressStatus">准备中...</span>
                    <span id="progressPercent">0%</span>
                </div>
            </div>
            
            <button onclick="startTranscribe()" id="transcribeBtn" disabled style="margin-bottom: 20px;">
                🚀 开始转写
            </button>
            
            <div class="result-box" id="resultBox">
                <div class="result-header">
                    <h3 style="font-size: 18px; color: #111827;">📋 转写结果</h3>
                    <button class="copy-btn" onclick="copyResult()">复制文字</button>
                </div>
                <div class="result-content" id="resultContent"></div>
            </div>
            
            <div class="tips">
                <strong>💡 使用提示：</strong><br>
                1. 首次使用需下载模型，请保持页面打开<br>
                2. 30分钟视频约需 20-30 分钟处理（Base模型）<br>
                3. 建议使用 Chrome/Edge 浏览器以获得最佳性能<br>
                4. 处理过程中请勿关闭或刷新页面
            </div>
        </div>
    </div>

<script type="module">
    import { pipeline, env } from 'https://cdn.jsdelivr.net/npm/@xenova/transformers@2.17.2';
    
    env.remoteHost = 'https://www.modelscope.cn';
    env.remotePathTemplate = 'models/{model}/resolve/master/';
    env.allowLocalModels = true;
    env.useBrowserCache = true;
    
    let transcriber = null;
    let currentFile = null;
    let isModelLoaded = false;
    
    const dropZone = document.getElementById('dropZone');
    const fileInput = document.getElementById('fileInput');
    const statusAlert = document.getElementById('statusAlert');
    
    dropZone.addEventListener('click', () => fileInput.click());
    dropZone.addEventListener('dragover', (e) => {
        e.preventDefault();
        dropZone.classList.add('dragover');
    });
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
    dropZone.addEventListener('drop', (e) => {
        e.preventDefault();
        dropZone.classList.remove('dragover');
        if (e.dataTransfer.files.length > 0) handleFile(e.dataTransfer.files[0]);
    });
    fileInput.addEventListener('change', (e) => {
        if (e.target.files.length > 0) handleFile(e.target.files[0]);
    });
    
    function showStatus(message, type = 'info') {
        statusAlert.textContent = message;
        statusAlert.className = `alert ${type} show`;
    }
    
    function updateProgress(percent, status) {
        document.getElementById('progressBar').style.width = percent + '%';
        document.getElementById('progressPercent').textContent = percent + '%';
        if (status) document.getElementById('progressStatus').textContent = status;
    }
    
    function formatTime(seconds) {
        if (!seconds || seconds === 0) return '-';
        const mins = Math.floor(seconds / 60);
        const secs = Math.floor(seconds % 60);
        return `${mins}:${secs.toString().padStart(2, '0')}`;
    }
    
    // 繁体转简体（简单映射）
    function traditionalToSimple(text) {
        const map = {
            '我們': '我们', '這個': '这个', '這樣': '这样', '學校': '学校',
            '親近': '亲近', '臉書': '脸书', '這邊': '这边', '應該': '应该',
            '與': '与', '無': '无', '還有': '还有', '讓': '让', '這': '这',
            '們': '们', '個': '个', '說': '说', '時': '时', '後': '后',
            '進': '进', '問': '问', '開': '开', '來': '来', '東': '东',
            '對': '对', '過': '过', '現': '现', '長': '长', '頭': '头',
            '話': '话', '點': '点', '發': '发', '覺': '觉', '車': '车',
            '經': '经', '當': '当', '從': '从', '兩': '两', '會': '会',
            '什': '什', '麼': '么', '怎': '怎', '麼': '么', '您': '您',
            '們': '们', '別': '别', '關': '关', '係': '系', '選': '选',
            '擇': '择', '結': '结', '構': '构', '問': '问', '題': '题',
            '態': '态', '應': '应', '該': '该', '試': '试', '圖': '图',
            '書': '书', '畫': '画', '盡': '尽', '量': '量', '見': '见',
            '識': '识', '證': '证', '認': '认', '識': '识', '語': '语',
            '調': '调', '節': '节', '務': '务', '務': '务', '場': '场',
            '館': '馆', '興': '兴', '奮': '奋', '處': '处', '處': '处',
            '點': '点', '擊': '击', '關': '关', '係': '系', '統': '统',
            '計': '计', '劃': '划', '則': '则', '剛': '刚', '才': '才',
            '剛': '刚', '纔': '才', '買': '买', '賣': '卖', '讀': '读',
            '寫': '写', '聽': '听', '見': '见', '聞': '闻', '聲': '声',
            '響': '响', '響': '响', '區': '区', '別': '别', '隻': '只',
            '隻': '只', '隻': '只', '雙': '双', '對': '对', '對': '对',
            '應': '应', '該': '该', '準': '准', '備': '备', '複': '复',
            '雜': '杂', '簡': '简', '單': '单', '愛': '爱', '護': '护',
            '據': '据', '說': '说', '談': '谈', '論': '论', '講': '讲',
            '話': '话', '語': '语', '言': '言', '記': '记', '錄': '录',
            '載': '载', '資': '资', '料': '料', '財': '财', '產': '产',
            '實': '实', '現': '现', '實': '实', '現': '现', '場': '场',
            '觀': '观', '眾': '众', '眾': '众', '親': '亲', '們': '们',
            '們': '们', '們': '们', '嗎': '吗', '呢': '呢', '吧': '吧',
            '啊': '啊', '哦': '哦', '嗯': '嗯', '唉': '唉', '喲': '哟',
            '餵': '喂', '餵': '喂', '誒': '诶', '吶': '呐', '唄': '呗',
            '喏': '喏', '喔': '喔', '唷': '唷', '啵': '啵', '啰': '啰',
            '嘍': '喽', '嘛': '嘛', '嘞': '嘞', '喱': '喱', '喱': '喱'
        };
        
        let result = text;
        for (let [trad, simp] of Object.entries(map)) {
            result = result.replace(new RegExp(trad, 'g'), simp);
        }
        return result;
    }
    
    // 智能添加标点符号（基于停顿和关键词）
    function addPunctuation(text) {
        // 在明显停顿处添加标点
        let result = text
            // 在"然后"、"但是"、"所以"前加句号或逗号
            .replace(/([然后|但是|所以|可是|不过|接着|接下来|最后|首先|其次])/g, '，$1')
            // 在语气词后加标点
            .replace(/([吗|呢|吧|啊|哦|嗯])([^，。！？])/g, '$1，$2')
            // 在"是"、"有"等词后适当断句
            .replace(/([我们|你们|他们|大家|老师|小朋友])([要|想|觉得|认为])/g, '$1$2')
            // 长句在"的"后适当断句（避免过度）
            .replace(/的([^，。！？]{10,})/g, '的，$1')
            // 去除连续重复的标点
            .replace(/([，。！？])\1+/g, '$1')
            // 句末加句号
            .replace(/([^。！？])$/g, '$1。');
            
        return result;
    }
    
    function handleFile(file) {
        currentFile = file;
        const sizeMB = (file.size / 1024 / 1024).toFixed(1);
        document.getElementById('fileSize').textContent = sizeMB + ' MB';
        document.getElementById('statsPanel').style.display = 'grid';
        
        const modelSpeed = document.getElementById('modelSelect').value === 'tiny' ? 2 : 
                          document.getElementById('modelSelect').value === 'base' ? 0.8 : 0.4;
        const estimateMin = Math.ceil(sizeMB * modelSpeed);
        document.getElementById('estimateTime').textContent = estimateMin + '分钟';
        
        showStatus(`已选择：${file.name}（${sizeMB} MB）`, 'success');
        document.getElementById('transcribeBtn').disabled = !isModelLoaded;
    }
    
    window.loadModel = async function() {
        const modelName = document.getElementById('modelSelect').value;
        const btn = document.getElementById('loadModelBtn');
        
        btn.disabled = true;
        btn.innerHTML = '<span class="loading"></span>加载中...';
        showStatus(`正在下载 ${modelName} 模型...`, 'info');
        document.getElementById('progressBox').classList.add('show');
        updateProgress(5, '连接服务器...');
        
        try {
            await new Promise(resolve => setTimeout(resolve, 500));
            
            transcriber = await pipeline(
                'automatic-speech-recognition',
                `Xenova/whisper-${modelName}`,
                {
                    progress_callback: (progress) => {
                        if (progress.status === 'progress') {
                            const pct = Math.round(progress.progress * 100);
                            updateProgress(5 + pct * 0.9, `下载中... ${pct}%`);
                        }
                    }
                }
            );
            
            isModelLoaded = true;
            updateProgress(100, '完成');
            showStatus(`✅ ${modelName} 模型就绪！`, 'success');
            document.getElementById('transcribeBtn').disabled = !currentFile;
            
            setTimeout(() => document.getElementById('progressBox').classList.remove('show'), 2000);
            
        } catch (error) {
            showStatus(`失败：${error.message}`, 'error');
        } finally {
            btn.disabled = false;
            btn.innerHTML = '⚡ 加载模型';
        }
    };
    
    window.startTranscribe = async function() {
        if (!currentFile) {
            showStatus('请先选择文件', 'error');
            return;
        }
        if (!transcriber) {
            showStatus('请先加载模型', 'warning');
            return;
        }
        
        const btn = document.getElementById('transcribeBtn');
        btn.disabled = true;
        btn.innerHTML = '<span class="loading"></span>处理中...';
        document.getElementById('progressBox').classList.add('show');
        document.getElementById('resultBox').classList.remove('show');
        
        try {
            updateProgress(5, '读取文件...');
            const arrayBuffer = await currentFile.arrayBuffer();
            
            updateProgress(10, '解码音频...');
            const audioContext = new (window.AudioContext || window.webkitAudioContext)({
                sampleRate: 16000
            });
            
            const audioBuffer = await audioContext.decodeAudioData(arrayBuffer);
            const duration = audioBuffer.duration;
            document.getElementById('audioDuration').textContent = formatTime(duration);
            
            const channelData = audioBuffer.getChannelData(0);
            
            // 关键参数设置
            const chunkDuration = 30; // 30秒一段，保持上下文连贯
            const overlapDuration = 5; // 5秒重叠，减少断句错误
            const sampleRate = 16000;
            const chunkSize = chunkDuration * sampleRate;
            const overlapSize = overlapDuration * sampleRate;
            
            const totalChunks = Math.ceil(channelData.length / (chunkSize - overlapSize));
            let segments = []; // 存储带时间戳的段落
            
            updateProgress(20, 'AI转写中...');
            
            if (totalChunks > 1) {
                for (let i = 0; i < totalChunks; i++) {
                    const start = Math.max(0, i * (chunkSize - overlapSize));
                    const end = Math.min((i + 1) * chunkSize, channelData.length);
                    const chunk = channelData.slice(start, end);
                    
                    // 关键修复：使用 'zh' 而非 'chinese'，开启时间戳和上下文
                    const result = await transcriber(chunk, {
                        language: 'zh',  // 关键：简体中文
                        task: 'transcribe',
                        return_timestamps: true,  // 返回时间戳，有助于断句
                        chunk_length_s: 30,
                        stride_length_s: 5,
                        condition_on_previous_text: true,  // 基于前文生成，提高连贯性
                        no_repeat_ngram_size: 3,
                        repetition_penalty: 1.2
                    });
                    
                    // 处理返回结果（可能是数组或对象）
                    const textChunks = Array.isArray(result.chunks) ? result.chunks : 
                                      (result.text ? [{text: result.text, timestamp: [i*30, (i+1)*30]}] : []);
                    
                    segments.push(...textChunks);
                    
                    const progress = 20 + Math.round((i + 1) / totalChunks * 70);
                    updateProgress(progress, `第${i+1}/${totalChunks}段...`);
                    
                    await new Promise(resolve => setTimeout(resolve, 100));
                }
                
                // 合并段落并格式化
                let formattedText = '';
                let lastText = '';
                
                for (let seg of segments) {
                    const text = seg.text || '';
                    const timestamp = seg.timestamp || [0, 0];
                    
                    // 跳过与上一段完全相同的重叠内容
                    if (text === lastText) continue;
                    
                    // 繁体转简体
                    const simpleText = traditionalToSimple(text);
                    
                    // 添加标点
                    const punctuatedText = addPunctuation(simpleText);
                    
                    // 按时间戳换行（每30秒换行，便于阅读）
                    if (formattedText) formattedText += '\n\n';
                    formattedText += `[${formatTime(timestamp[0])}] ${punctuatedText}`;
                    
                    lastText = text;
                }
                
                displayResult(formattedText, duration);
                
            } else {
                // 短音频直接处理
                const result = await transcriber(channelData, {
                    language: 'zh',
                    task: 'transcribe',
                    return_timestamps: true,
                    condition_on_previous_text: true,
                    no_repeat_ngram_size: 3,
                    repetition_penalty: 1.2
                });
                
                updateProgress(90, '整理结果...');
                
                let text = result.text || '';
                text = traditionalToSimple(text);
                text = addPunctuation(text);
                
                displayResult(text, duration);
            }
            
            updateProgress(100, '完成');
            showStatus('✅ 转写完成！已自动转换为简体并添加标点', 'success');
            
        } catch (error) {
            showStatus(`处理失败：${error.message}`, 'error');
            console.error(error);
        } finally {
            btn.disabled = false;
            btn.innerHTML = '🚀 开始转写';
        }
    };
    
    function displayResult(text, duration) {
        const content = document.getElementById('resultContent');
        const resultBox = document.getElementById('resultBox');
        
        const timestamp = new Date().toLocaleString('zh-CN');
        const header = `📝 生成时间：${timestamp}\n⏱️ 音频时长：${formatTime(duration)}\n\n`;
        
        content.textContent = header + text;
        resultBox.classList.add('show');
        resultBox.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }
    
    window.copyResult = function() {
        const text = document.getElementById('resultContent').textContent;
        navigator.clipboard.writeText(text).then(() => {
            showStatus('已复制到剪贴板！', 'success');
        }).catch(() => {
            showStatus('复制失败，请手动复制', 'error');
        });
    };
</script>
</body>
</html>

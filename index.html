<script type="module">
    import { pipeline, env } from 'https://cdn.jsdelivr.net/npm/@xenova/transformers@2.17.2';
    
    // 关键修复：强制使用 jsDelivr 完整路径，绕过当前域名的 SPA 回退
    env.remoteHost = 'https://cdn.jsdelivr.net';
    env.remotePathTemplate = 'npm/@xenova/transformers@2.17.2/models/{model}/';
    
    // 禁用本地模型路径解析，强制使用绝对 URL
    env.allowLocalModels = false;  
    env.useBrowserCache = true;
    
    let transcriber = null;
    let currentFile = null;
    let isModelLoaded = false;
    
    const dropZone = document.getElementById('dropZone');
    const fileInput = document.getElementById('fileInput');
    const statusAlert = document.getElementById('statusAlert');
    
    dropZone.addEventListener('click', () => fileInput.click());
    dropZone.addEventListener('dragover', (e) => {
        e.preventDefault();
        dropZone.classList.add('dragover');
    });
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
    dropZone.addEventListener('drop', (e) => {
        e.preventDefault();
        dropZone.classList.remove('dragover');
        if (e.dataTransfer.files.length > 0) handleFile(e.dataTransfer.files[0]);
    });
    fileInput.addEventListener('change', (e) => {
        if (e.target.files.length > 0) handleFile(e.target.files[0]);
    });
    
    function showStatus(message, type = 'info') {
        statusAlert.textContent = message;
        statusAlert.className = `alert ${type} show`;
    }
    
    function updateProgress(percent, status) {
        document.getElementById('progressBar').style.width = percent + '%';
        document.getElementById('progressPercent').textContent = percent + '%';
        if (status) document.getElementById('progressStatus').textContent = status;
    }
    
    function formatTime(seconds) {
        if (!seconds || seconds === 0) return '-';
        const mins = Math.floor(seconds / 60);
        const secs = Math.floor(seconds % 60);
        return `${mins}:${secs.toString().padStart(2, '0')}`;
    }
    
    // 繁体转简体（简化版）
    function traditionalToSimple(text) {
        const map = {
            '變': '变', '馬': '马', '時': '时', '進': '进', '學': '学', '說': '说', '話': '话',
            '們': '们', '這': '这', '個': '个', '來': '来', '問': '问', '題': '题', '開': '开',
            '長': '长', '東': '东', '車': '车', '書': '书', '畫': '画', '見': '见', '識': '识',
            '認': '认', '語': '语', '調': '调', '節': '节', '務': '务', '場': '场', '點': '点',
            '擊': '击', '統': '统', '計': '计', '劃': '划', '則': '则', '剛': '刚', '纔': '才',
            '買': '买', '賣': '卖', '讀': '读', '寫': '写', '聽': '听', '聞': '闻', '聲': '声',
            '響': '响', '區': '区', '別': '别', '隻': '只', '雙': '双', '對': '对', '備': '备',
            '複': '复', '雜': '杂', '簡': '简', '單': '单', '愛': '爱', '護': '护', '據': '据',
            '談': '谈', '論': '论', '講': '讲', '記': '记', '錄': '录', '載': '载', '資': '资',
            '料': '料', '財': '财', '產': '产', '實': '实', '現': '现', '觀': '观', '眾': '众',
            '親': '亲', '幫': '帮', '請': '请', '沒': '没', '還': '还', '讓': '让', '過': '过',
            '發': '发', '覺': '觉', '經': '经', '當': '当', '從': '从', '兩': '两', '會': '会',
            '您': '您', '關': '关', '係': '系', '選': '选', '擇': '择', '結': '结', '構': '构',
            '態': '态', '圖': '图', '為': '为', '無': '无', '與': '与', '轉': '转', '換': '换',
            '顯': '显', '示': '示', '後': '后', '並': '并', '於': '于', '產': '产', '種': '种'
        };
        
        let result = text;
        for (let [trad, simp] of Object.entries(map)) {
            result = result.replace(new RegExp(trad, 'g'), simp);
        }
        return result;
    }
    
    // 添加标点
    function addPunctuation(text) {
        return text
            .replace(/([然后|但是|所以|可是|不过|接着|接下来|最后|首先|其次|另外|而且])/g, '，$1')
            .replace(/([吗|呢|吧|啊|哦|嗯])([^，。！？])/g, '$1，$2')
            .replace(/([^。！？])$/g, '$1。');
    }
    
    function handleFile(file) {
        currentFile = file;
        const sizeMB = (file.size / 1024 / 1024).toFixed(1);
        document.getElementById('fileSize').textContent = sizeMB + ' MB';
        document.getElementById('statsPanel').style.display = 'grid';
        
        const modelSpeed = document.getElementById('modelSelect').value === 'tiny' ? 2 : 
                          document.getElementById('modelSelect').value === 'base' ? 0.8 : 0.4;
        const estimateMin = Math.ceil(sizeMB * modelSpeed);
        document.getElementById('estimateTime').textContent = estimateMin + '分钟';
        
        showStatus(`已选择：${file.name}（${sizeMB} MB）`, 'success');
        document.getElementById('transcribeBtn').disabled = !isModelLoaded;
    }
    
    window.loadModel = async function() {
        const modelName = document.getElementById('modelSelect').value;
        const btn = document.getElementById('loadModelBtn');
        
        btn.disabled = true;
        btn.innerHTML = '<span class="loading"></span>加载中...';
        showStatus(`正在从 jsDelivr 下载 ${modelName} 模型...`, 'info');
        document.getElementById('progressBox').classList.add('show');
        updateProgress(10, '连接 CDN...');
        
        try {
            await new Promise(resolve => setTimeout(resolve, 500));
            
            // 关键：使用 jsDelivr 完整路径，绕过当前域名
            transcriber = await pipeline(
                'automatic-speech-recognition',
                `Xenova/whisper-${modelName}`,
                {
                    progress_callback: (progress) => {
                        if (progress.status === 'progress') {
                            const pct = Math.round(progress.progress * 100);
                            updateProgress(10 + pct * 0.8, `下载中... ${pct}%`);
                        }
                    }
                }
            );
            
            isModelLoaded = true;
            updateProgress(100, '完成');
            showStatus(`✅ ${modelName} 模型已就绪！`, 'success');
            document.getElementById('transcribeBtn').disabled = !currentFile;
            
            setTimeout(() => document.getElementById('progressBox').classList.remove('show'), 2000);
            
        } catch (error) {
            console.error('模型加载错误:', error);
            showStatus(`加载失败：${error.message}。请刷新重试或切换网络`, 'error');
        } finally {
            btn.disabled = false;
            btn.innerHTML = '⚡ 加载模型';
        }
    };
    
    window.startTranscribe = async function() {
        if (!currentFile) {
            showStatus('请先选择文件', 'error');
            return;
        }
        if (!transcriber) {
            showStatus('请先加载模型', 'warning');
            return;
        }
        
        const btn = document.getElementById('transcribeBtn');
        btn.disabled = true;
        btn.innerHTML = '<span class="loading"></span>处理中...';
        document.getElementById('progressBox').classList.add('show');
        document.getElementById('resultBox').classList.remove('show');
        
        try {
            updateProgress(5, '读取文件...');
            const arrayBuffer = await currentFile.arrayBuffer();
            
            updateProgress(15, '解码音频...');
            const audioContext = new (window.AudioContext || window.webkitAudioContext)({
                sampleRate: 16000
            });
            
            const audioBuffer = await audioContext.decodeAudioData(arrayBuffer);
            const totalDuration = audioBuffer.duration;
            document.getElementById('audioDuration').textContent = formatTime(totalDuration);
            
            const channelData = audioBuffer.getChannelData(0);
            
            // 分段处理
            const chunkDuration = 30;
            const overlapDuration = 5;
            const sampleRate = 16000;
            const chunkSize = chunkDuration * sampleRate;
            const stepSize = (chunkDuration - overlapDuration) * sampleRate;
            
            const totalChunks = Math.ceil((channelData.length - overlapDuration * sampleRate) / stepSize);
            let allSegments = [];
            let currentSpeaker = 'A';
            let lastEndTime = 0;
            
            updateProgress(20, 'AI转写中...');
            
            for (let i = 0; i < totalChunks; i++) {
                const startSample = i * stepSize;
                const endSample = Math.min(startSample + chunkSize, channelData.length);
                const chunk = channelData.slice(startSample, endSample);
                
                const actualStartTime = startSample / sampleRate;
                
                const result = await transcriber(chunk, {
                    language: 'zh',
                    task: 'transcribe',
                    return_timestamps: true,
                    condition_on_previous_text: true,
                    no_repeat_ngram_size: 3,
                    repetition_penalty: 1.2
                });
                
                const chunks = result.chunks || [{text: result.text, timestamp: [0, 30]}];
                
                for (let seg of chunks) {
                    const segText = seg.text || '';
                    if (!segText.trim()) continue;
                    
                    const simpleText = traditionalToSimple(segText);
                    
                    if (actualStartTime - lastEndTime > 3) {
                        currentSpeaker = currentSpeaker === 'A' ? 'B' : 'A';
                    }
                    
                    allSegments.push({
                        text: simpleText,
                        startTime: actualStartTime + (seg.timestamp?.[0] || 0),
                        endTime: actualStartTime + (seg.timestamp?.[1] || 30),
                        speaker: `说话人${currentSpeaker}`
                    });
                    
                    lastEndTime = actualStartTime + (seg.timestamp?.[1] || 30);
                }
                
                const progress = 20 + Math.round((i + 1) / totalChunks * 70);
                updateProgress(progress, `第${i+1}/${totalChunks}段...`);
                
                await new Promise(resolve => setTimeout(resolve, 100));
            }
            
            updateProgress(90, '整理结果...');
            
            let formattedText = '';
            let lastText = '';
            
            for (let seg of allSegments) {
                if (seg.text === lastText) continue;
                if (seg.text.length > 10 && lastText.length > 10 && 
                    seg.text.includes(lastText.slice(-10))) continue;
                
                const punctuatedText = addPunctuation(seg.text);
                formattedText += `[${formatTime(seg.startTime)}] ${seg.speaker}：${punctuatedText}\n\n`;
                lastText = seg.text;
            }
            
            displayResult(formattedText, totalDuration);
            
            updateProgress(100, '完成');
            showStatus('✅ 转写完成！', 'success');
            
        } catch (error) {
            showStatus(`处理失败：${error.message}`, 'error');
            console.error(error);
        } finally {
            btn.disabled = false;
            btn.innerHTML = '🚀 开始转写';
        }
    };
    
    function displayResult(text, duration) {
        const content = document.getElementById('resultContent');
        const resultBox = document.getElementById('resultBox');
        
        const timestamp = new Date().toLocaleString('zh-CN');
        const header = `📝 生成时间：${timestamp}\n⏱️ 音频时长：${formatTime(duration)}\n💡 说话人标记基于停顿自动推测\n\n`;
        
        content.textContent = header + text;
        resultBox.classList.add('show');
        resultBox.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }
    
    window.copyResult = function() {
        const text = document.getElementById('resultContent').textContent;
        navigator.clipboard.writeText(text).then(() => {
            showStatus('已复制到剪贴板！', 'success');
        }).catch(() => {
            showStatus('复制失败，请手动复制', 'error');
        });
    };
</script>
